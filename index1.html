<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEABPD Israel - קונספט</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#1f3c6e',
                            softBlue: '#eef2f9',
                            red: '#cd251c',
                            bg: '#fffefc'
                        }
                    },
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    },
                    boxShadow: {
                        'softer': '0 4px 20px -2px rgba(31, 60, 110, 0.05)',
                        'soft': '0 10px 30px -5px rgba(31, 60, 110, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fffefc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const IconHeart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconPhoneCall = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const IconUsers = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconAlert = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const IconCheck = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconQuote = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" /></svg>;

        const { useState, useEffect } = React;

        const InternalHero = ({ title, subtitle, icon: Icon, badge }) => (
            <div className="relative pt-32 pb-16 mb-12 overflow-hidden border-b border-gray-100">
                <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-brand-softBlue/50 to-white -z-10"></div>
                <div className="container mx-auto px-4 max-w-4xl text-center relative z-10">
                    {Icon && (
                        <div className="w-16 h-16 bg-white text-brand-blue rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-brand-softBlue/50 rotate-3">
                            <Icon className="w-8 h-8 -rotate-3" />
                        </div>
                    )}
                    {badge && <div className="inline-block bg-brand-softBlue text-brand-blue px-4 py-1.5 rounded-full font-bold mb-4 text-sm tracking-wide border border-brand-blue/10">{badge}</div>}
                    <h1 className="text-4xl lg:text-5xl font-extrabold text-brand-blue mb-4 leading-tight">{title}</h1>
                    <p className="text-xl text-gray-600 max-w-2xl mx-auto leading-relaxed">{subtitle}</p>
                </div>
            </div>
        );

        const SuitabilityPage = ({ navigate }) => (
            <div className="animate-fade-in pb-20">
                <InternalHero 
                    title="האם זה מתאים לנו?" 
                    subtitle="שאלון בדיקה עצמית למשפחות ואנשים קרובים"
                    icon={IconCheck}
                />
                <div className="container mx-auto px-4 max-w-4xl">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-soft border border-gray-100 mb-10">
                        <h2 className="text-2xl font-bold text-brand-blue mb-6">האם אתם מזהים חלק מהתנהגויות אלו אצל יקירכם?</h2>
                        <p className="text-gray-600 mb-6 text-lg">אין צורך באבחנה רשמית של הפרעת אישיות גבולית (BPD) כדי לקבל מענה מהעמותה. סמנו את המשפטים שמתארים את החוויה שלכם:</p>
                        <ul className="space-y-4 mb-8">
                            {[
                                "פגיעות עצמיות או איומים אובדניים שחוזרים על עצמם.",
                                "חוסר ויסות רגשי חמור או כרוני – תגובות עוצמתיות מאוד שקשה להרגיע.",
                                "תנודות חדות ומהירות במצב הרוח, מעברים מקיצוניות לקיצוניות.",
                                "תחושה מתמדת של 'הליכה על ביצים' מחשש לעורר התפרצות או זעם.",
                                "יחסים סוערים ולא יציבים – מעבר מהיר מאידיאליזציה לניתוק קשר.",
                                "פחד נטישה עוצמתי או תלות רגשית חזקה במיוחד.",
                                "בלבול, שחיקה וחוסר אונים אצלכם, בני המשפחה."
                            ].map((item, i) => (
                                <label key={i} className="flex items-start gap-4 p-5 bg-brand-softBlue/20 rounded-xl cursor-pointer hover:bg-brand-softBlue/50 transition border border-transparent hover:border-brand-softBlue">
                                    <input type="checkbox" className="mt-1 w-5 h-5 text-brand-blue rounded border-gray-300 focus:ring-brand-blue" />
                                    <span className="text-gray-800 font-medium text-lg leading-snug">{item}</span>
                                </label>
                            ))}
                        </ul>
                        <div className="bg-brand-softBlue/50 p-6 rounded-2xl border border-brand-softBlue">
                            <h3 className="font-bold text-brand-blue mb-2 text-xl">חשוב לדעת:</h3>
                            <p className="text-gray-700 leading-relaxed mb-4">
                                אם חלק מהמשפטים האלו מתארים את המציאות שלכם, קורס קשרי משפחה והכלים המבוססים מחקר (DBT) שאנו מציעים יכולים לסייע לכם להחזיר את היציבות הביתה. אנו כאן כדי לעזור.
                            </p>
                        </div>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onClick={() => navigate('guidance')} className="bg-brand-blue text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-brand-blue/90 transition shadow-soft">
                            אני רוצה לתאם שיחת הכוונה
                        </button>
                        <button onClick={() => navigate('course')} className="bg-white text-brand-blue border-2 border-brand-blue px-8 py-4 rounded-full font-bold text-lg hover:bg-brand-softBlue transition">
                            למידע על קורס קשרי משפחה
                        </button>
                    </div>
                </div>
            </div>
        );

        const IndividualsPage = ({ navigate }) => (
            <div className="animate-fade-in pb-20">
                 <InternalHero 
                    title="מידע למתמודדים" 
                    subtitle="אתם לא לבד בזה. יש כלים, יש תקווה ויש דרכים להרגיש טוב יותר."
                    icon={IconHeart}
                />
                <div className="container mx-auto px-4 max-w-4xl">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-soft border border-gray-100">
                        <p className="text-lg text-gray-700 mb-6 leading-relaxed">
                            לחיות עם הפרעת אישיות גבולית (BPD) או אי-ויסות רגשי חמור זו התמודדות מאתגרת וכואבת. עוצמת הרגשות יכולה להרגיש מציפה, והקשיים במערכות יחסים יכולים לעייף. 
                            חשוב לנו שתדעו שיש היום טיפולים מבוססי מחקר שיעילותם מוכחת, בראשם <strong>טיפול דיאלקטי-התנהגותי (DBT)</strong>, שעוזר למאות אלפי אנשים בעולם לבנות חיים ששווה לחיות אותם.
                        </p>
                        <div className="grid md:grid-cols-2 gap-6 mb-8">
                            <div className="bg-brand-softBlue/30 p-6 rounded-2xl border border-brand-softBlue/50 hover:shadow-sm transition">
                                <div className="text-brand-blue mb-4"><IconBook /></div>
                                <h3 className="font-bold text-xl text-brand-blue mb-2">מרכז ידע וכלים (DBT)</h3>
                                <p className="text-gray-700 mb-4">סרטונים, מאמרים וכלים מעולמות ה-DBT שיכולים לעזור בהבנת המצב, ויסות רגשי וניהול משברים.</p>
                                <button onClick={() => navigate('knowledge')} className="text-brand-blue font-bold flex items-center gap-2 hover:underline">למרכז הידע <IconArrowLeft/></button>
                            </div>
                            <div className="bg-brand-softBlue/30 p-6 rounded-2xl border border-brand-softBlue/50 hover:shadow-sm transition">
                                <div className="text-brand-blue mb-4"><IconUsers className="" /></div>
                                <h3 className="font-bold text-xl text-brand-blue mb-2">קהילה וקבוצות תמיכה</h3>
                                <p className="text-gray-700 mb-4">מידע על קבוצות תמיכה למתמודדים, מסגרות טיפול וגורמי טיפול מוסמכים ב-DBT בישראל.</p>
                                <button onClick={() => navigate('knowledge')} className="text-brand-blue font-bold flex items-center gap-2 hover:underline">למשאבים נוספים <IconArrowLeft/></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const ProfessionalsPage = ({ navigate }) => (
            <div className="animate-fade-in pb-20">
                 <InternalHero 
                    title="לאנשי מקצוע" 
                    subtitle="שותפות לדרך, ידע מקצועי והכשרות ב-DBT ובהפרעת אישיות גבולית."
                />
                <div className="container mx-auto px-4 max-w-4xl">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-soft border border-gray-100">
                        <p className="text-lg text-gray-700 mb-6 leading-relaxed">
                            NEABPD Israel רואה בכם, המטפלים ואנשי המקצוע, שותפים טבעיים לדרך. אנו פועלים להנגשת ידע מבוסס מחקר, כלים מעולמות ה-DBT, וקיום ימי עיון והכשרות ייעודיות לצוותים טיפוליים ולמטפלים בקליניקות.
                        </p>
                        <ul className="space-y-4 mb-8">
                            <li className="flex items-start gap-3 p-4 bg-gray-50 rounded-xl"><IconCheck className="text-brand-blue mt-1 shrink-0" /><span className="text-gray-700"><strong>הפניית משפחות:</strong> שילוב המשפחה בקורס 'קשרי משפחה' כחלק ממעטפת הטיפול מגביר משמעותית את סיכויי ההצלחה של המטופל.</span></li>
                            <li className="flex items-start gap-3 p-4 bg-gray-50 rounded-xl"><IconCheck className="text-brand-blue mt-1 shrink-0" /><span className="text-gray-700"><strong>ימי עיון:</strong> הרצאות מומחים מהארץ ומהעולם בתחום ה-BPD וה-DBT.</span></li>
                            <li className="flex items-start gap-3 p-4 bg-gray-50 rounded-xl"><IconCheck className="text-brand-blue mt-1 shrink-0" /><span className="text-gray-700"><strong>מאגר אקדמי:</strong> מאמרים ומחקרים עדכניים לשימוש קליני מבוסס ראיות (Evidence-based).</span></li>
                        </ul>
                        <button className="bg-brand-blue text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-brand-blue/90 transition shadow-soft">
                            הצטרפו לרשימת התפוצה לאנשי מקצוע
                        </button>
                    </div>
                </div>
            </div>
        );

        const CoursePage = ({ navigate }) => (
            <div className="animate-fade-in bg-gray-50/50 pb-20">
                <InternalHero 
                    badge="ספינת הדגל של העמותה"
                    title="קורס קשרי משפחה" 
                    subtitle="תוכנית מבוססת מחקר (DBT) המעניקה ידע וכלים מעשיים להתמודדות משפחתית והחזרת היציבות הביתה."
                    icon={IconUsers}
                />
                
                <div className="container mx-auto px-4 max-w-5xl">
                    <div className="grid md:grid-cols-3 gap-8">
                        {/* Right column - Main info */}
                        <div className="md:col-span-2">
                            <h2 className="text-3xl font-bold text-brand-blue mb-6">ללמוד איך להתמודד, יחד.</h2>
                            <p className="text-lg text-gray-700 mb-6 leading-relaxed">
                                קורס קשרי משפחה (Family Connections) הוא תוכנית מבוססת מחקר (Evidence-based) בת 12 מפגשים, המיועדת להורים, בני זוג, אחים וילדים בוגרים של מתמודדים עם הפרעת אישיות גבולית (BPD) או אי-ויסות רגשי חמור. הקורס מונחה על ידי אנשי מקצוע ובני משפחה שעברו הכשרה ייעודית.
                            </p>
                            
                            <h3 className="text-2xl font-bold text-brand-blue mt-10 mb-6">מה לומדים בקורס?</h3>
                            <div className="grid sm:grid-cols-2 gap-4 mb-10">
                                {[
                                    "מידע עדכני ומבוסס מחקר על BPD.",
                                    "מיומנויות DBT לאיזון רגשי של בן המשפחה.",
                                    "כלים לתקשורת אפקטיבית (תיקוף / Validation).",
                                    "הצבת גבולות בצורה שומרת ומכבדת.",
                                    "התמודדות נכונה עם משברים ופגיעה עצמית.",
                                    "בניית רשת תמיכה משפחתית וקהילתית."
                                ].map((item, i) => (
                                    <div key={i} className="flex gap-3 bg-white p-5 rounded-xl items-center border border-gray-100 shadow-sm">
                                        <div className="w-2 h-2 bg-brand-blue rounded-full shrink-0"></div>
                                        <span className="text-gray-800 font-medium">{item}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-brand-softBlue/30 p-6 rounded-2xl mb-10 border border-brand-softBlue/50">
                                <h4 className="font-bold text-brand-blue mb-2 text-lg">מסלול המשך: קורס רענון והעמקה</h4>
                                <p className="text-gray-700">לבוגרי הקורס הבסיסי, אנו מציעים קורס המשך מקוצר (8 מפגשים) המיועד לתרגול נוסף, העמקת מיומנויות ה-DBT ותמיכה קהילתית מתמשכת.</p>
                            </div>
                        </div>

                        {/* Left column - Sticky Info Card (Redesigned) */}
                        <div className="md:col-span-1">
                            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-soft border border-gray-100 sticky top-28">
                                
                                {/* Free Tag */}
                                <div className="bg-green-50 text-green-700 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2 mb-8 border border-green-200 shadow-sm">
                                    <IconCheck className="w-5 h-5" />
                                    הקורס ניתן ללא עלות (חינם)
                                </div>
                                
                                <h4 className="font-bold text-brand-blue text-xl mb-6">איך מצטרפים לקורס?</h4>
                                
                                <ol className="space-y-6 mb-8 relative before:absolute before:right-3.5 before:top-2 before:bottom-2 before:w-0.5 before:bg-brand-softBlue">
                                    <li className="flex gap-4 relative z-10">
                                        <div className="w-8 h-8 bg-brand-blue text-white rounded-full flex items-center justify-center font-bold text-sm shrink-0 shadow-sm">1</div>
                                        <div className="pt-1">
                                            <div className="font-bold text-gray-800 mb-1">שיחת הכוונה</div>
                                            <div className="text-sm text-gray-600">תיאום וקיום שיחה טלפונית לבדיקת התאמה.</div>
                                        </div>
                                    </li>
                                    <li className="flex gap-4 relative z-10">
                                        <div className="w-8 h-8 bg-brand-softBlue text-brand-blue rounded-full flex items-center justify-center font-bold text-sm shrink-0 border border-white">2</div>
                                        <div className="pt-1">
                                            <div className="font-bold text-gray-800 mb-1">רשימת המתנה</div>
                                            <div className="text-sm text-gray-600">הצטרפות לרשימת המתנה ארצית לקורס.</div>
                                        </div>
                                    </li>
                                    <li className="flex gap-4 relative z-10">
                                        <div className="w-8 h-8 bg-brand-softBlue text-brand-blue rounded-full flex items-center justify-center font-bold text-sm shrink-0 border border-white">3</div>
                                        <div className="pt-1">
                                            <div className="font-bold text-gray-800 mb-1">שיבוץ לקורס</div>
                                            <div className="text-sm text-gray-600">שיבוץ לקבוצה בהתאם לאזור המגורים וזמינות.</div>
                                        </div>
                                    </li>
                                </ol>

                                {/* Fixed CTA Button */}
                                <button onClick={() => navigate('guidance')} className="w-full bg-brand-blue text-white py-4 rounded-xl font-bold text-lg hover:bg-brand-blue/90 transition shadow-sm mb-3">
                                    לתיאום שיחת הכוונה
                                </button>
                                <p className="text-xs text-center text-gray-500 font-medium">זהו הצעד הראשון לקראת ההרשמה</p>
                            </div>
                        </div>
                    </div>

                    {/* Course Testimonials */}
                    <div className="mt-16 pt-16 border-t border-gray-200">
                        <h3 className="text-2xl font-bold text-brand-blue mb-8 text-center">מה אומרים בוגרי הקורס?</h3>
                        <div className="grid md:grid-cols-2 gap-6">
