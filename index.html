<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEABPD Israel - קונספט</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#1f3c6e',
                            softBlue: '#eef2f9',
                            red: '#cd251c',
                            bg: '#fffefc'
                        }
                    },
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    },
                    boxShadow: {
                        'softer': '0 4px 20px -2px rgba(31, 60, 110, 0.05)',
                        'soft': '0 10px 30px -5px rgba(31, 60, 110, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fffefc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const IconHeart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconPhoneCall = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const IconUsers = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconAlert = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const IconCheck = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconQuote = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z" /></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconCreditCard = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
        const IconAward = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
        const IconFolder = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>;
        const IconLink = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;

        const { useState, useEffect } = React;

        const InternalHero = ({ title, subtitle, icon: Icon, badge }) => (
            <div className="relative pt-32 pb-16 mb-12 overflow-hidden border-b border-gray-100">
                <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-brand-softBlue/50 to-white -z-10"></div>
                <div className="container mx-auto px-4 max-w-4xl text-center relative z-10">
                    {Icon && (
                        <div className="w-16 h-16 bg-white text-brand-blue rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-brand-softBlue/50 rotate-3">
                            <Icon className="w-8 h-8 -rotate-3" />
                        </div>
                    )}
                    {badge && <div className="inline-block bg-brand-softBlue text-brand-blue px-4 py-1.5 rounded-full font-bold mb-4 text-sm tracking-wide border border-brand-blue/10">{badge}</div>}
                    <h1 className="text-4xl lg:text-5xl font-extrabold text-brand-blue mb-4 leading-tight">{title}</h1>
                    <p className="text-xl text-gray-600 max-w-2xl mx-auto leading-relaxed">{subtitle}</p>
                </div>
            </div>
        );

        const SuitabilityPage = ({ navigate }) => {
            const [perspective, setPerspective] = useState('family');
            const [checks, setChecks] = useState(Array(9).fill(false));

            const isSelfPerspective = perspective === 'self';
            const suitabilityTexts = isSelfPerspective ? [
                "יש בי פחד עז מנטישה, גם כאשר אין סימן ממשי לכך שהקשר עומד להסתיים",
                "קשרים קרובים בחיי נעים לעיתים בין קרבה גדולה לריחוק קיצוני",
                "תחושת הזהות שלי אינה יציבה ולעיתים קשה לי לדעת מי אני באמת",
                "יש בחיי התנהגויות אימפולסיביות שמדאיגות אותי או את הסביבה",
                "היו או יש לי מחשבות על פגיעה עצמית או על התאבדות",
                "מצב הרוח שלי עשוי להשתנות בחדות בתוך שעות או ימים ספורים",
                "אני חווה תחושת ריקנות מתמשכת",
                "יש לי התפרצויות כעס עזות שקשה לי לשלוט בהן",
                "בתקופות של לחץ משמעותי אני עשוי לחוות ניתוק, חשדנות חריגה או תחושה שהמציאות אינה לגמרי ברורה"
            ] : [
                "פחד עז מנטישה, גם כאשר אין סימן ממשי לכך שהקשר עומד להסתיים",
                "קשרים המתאפיינים בעליות ובמורדות חדים — מקרבה גדולה ועד ריחוק קיצוני",
                "תחושת זהות שאינה יציבה ומשתנה מתקופה לתקופה",
                "התנהגויות אימפולסיביות שמעוררות דאגה, כמו הוצאות כספיות, נהיגה מסוכנת, אכילה או שימוש בחומרים",
                "דיבור על פגיעה עצמית או על מחשבות אובדניות, בהווה או בעבר",
                "שינויים חדים במצב הרוח בתוך שעות או ימים ספורים",
                "תחושת ריקנות מתמשכת",
                "התפרצויות כעס עזות, לא מותאמות למצב או קשות לשליטה",
                "בתקופות של לחץ משמעותי — ניתוק, חשדנות חריגה או קושי להישאר מחוברים למציאות"
            ];
            const checkedCount = checks.filter(Boolean).length;
            const total = suitabilityTexts.length;

            const toggle = (i) => setChecks(prev => { const c = [...prev]; c[i] = !c[i]; return c; });
            const resetQuiz = () => setChecks(Array(9).fill(false));

            let resultTitle = '', resultText = '', primaryCtaLabel = 'אני רוצה לתאם שיחת הכוונה';
            if (checkedCount >= 5) {
                resultTitle = 'זה נשמע כמו המקום הנכון עבורכם';
                resultText = `סימנתם ${checkedCount} מתוך ${total} — התמונה שאתם מתארים מוכרת לנו מאוד. קורס קשרי משפחה והכלים מבוססי המחקר (DBT) שלנו יכולים לעזור. הצעד הראשון המומלץ: שיחת הכוונה קצרה וללא עלות.`;
                primaryCtaLabel = 'לתיאום שיחת הכוונה עכשיו';
            } else if (checkedCount >= 3) {
                resultTitle = 'סימנתם כמה דברים משמעותיים';
                resultText = `סימנתם ${checkedCount} מתוך ${total} — יש כאן תמונה שכדאי לברר לעומק. שיחת הכוונה קצרה וללא עלות תעזור לכם להבין אם קורס קשרי משפחה או מרכז הידע הם הצעד הבא המתאים.`;
            } else if (checkedCount > 0) {
                resultTitle = 'חלק מהדברים מוכרים לכם';
                resultText = 'גם אם סימנתם רק חלק, אתם מוזמנים לפנות אלינו. מרכז הידע שלנו יכול להיות נקודת התחלה טובה, ואם תרצו — גם שיחת הכוונה תמיד פתוחה בפניכם.';
            }

            return (
                <div className="animate-fade-in pb-20">
                    <InternalHero
                        title="האם הפעילות שלנו יכולה להתאים?"
                        subtitle="כלי קצר ורגיש שיעזור להבין אילו מענים ופעילויות שלנו עשויים להיות רלוונטיים למצב שלכם"
                        icon={IconCheck}
                    />
                    <div className="container mx-auto px-4 max-w-6xl grid md:grid-cols-[1fr_360px] gap-6 items-start">
                        
                        {/* Right Column - Main Quiz */}
                        <div className="bg-white p-8 md:p-10 rounded-3xl shadow-soft border border-gray-100">
                            <p className="text-gray-600 text-lg mb-4">הכלי מיועד למשפחות ולאנשים המתמודדים בעצמם. אין צורך באבחנה רשמית, והוא אינו משמש לאבחון.</p>
                            <p className="text-gray-800 font-bold mb-3">מאיזו נקודת מבט תרצו לענות?</p>
                            <div className="flex gap-2 mb-6">
                                <button
                                    onClick={() => setPerspective('family')}
                                    className={`flex-1 py-2.5 px-4 rounded-full font-bold text-sm transition ${!isSelfPerspective ? 'bg-brand-blue text-white' : 'bg-white text-gray-600 border-2 border-gray-200'}`}
                                >
                                    ההתמודדות של אדם קרוב
                                </button>
                                <button
                                    onClick={() => setPerspective('self')}
                                    className={`flex-1 py-2.5 px-4 rounded-full font-bold text-sm transition ${isSelfPerspective ? 'bg-brand-blue text-white' : 'bg-white text-gray-600 border-2 border-gray-200'}`}
                                >
                                    ההתמודדות האישית שלי
                                </button>
                            </div>
                            <p className="text-gray-600 mb-5">{isSelfPerspective ? 'סמנו את המשפטים שמתארים דברים שמוכרים לכם מהחוויה האישית שלכם:' : 'סמנו את המשפטים שמתארים דברים שזיהיתם בקשר או בהתנהלות של האדם הקרוב אליכם:'}</p>
                            
                            <div className="h-2 bg-brand-softBlue/40 rounded-full overflow-hidden mb-5">
                                <div className="h-full bg-brand-blue rounded-full transition-all duration-200" style={{ width: `${(checkedCount / total) * 100}%` }}></div>
                            </div>
                            
                            <div className="space-y-3 mb-2">
                                {suitabilityTexts.map((text, i) => {
                                    const checked = checks[i];
                                    return (
                                        <label key={i} onClick={() => toggle(i)} className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer border-2 transition ${checked ? 'bg-brand-softBlue/40 border-brand-blue' : 'bg-white border-gray-200 hover:border-brand-softBlue'}`}>
                                            <span className={`w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 ${checked ? 'bg-brand-blue text-white' : 'border-2 border-gray-300'}`}>
                                                {checked && <IconCheck className="w-4 h-4" />}
                                            </span>
                                            <span className="text-gray-800 font-medium">{text}</span>
                                        </label>
                                    );
                                })}
                            </div>
                            {checkedCount > 0 && (
                                <button onClick={resetQuiz} className="text-gray-500 text-sm underline mt-4 hover:text-brand-blue transition">ניקוי הבחירות</button>
                            )}
                        </div>

                        {/* Left Column - Sticky Results Panel */}
                        <div className="md:sticky md:top-28">
                            {checkedCount === 0 ? (
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
                                    <IconCheck className="w-12 h-12 text-gray-200 mx-auto mb-4" />
                                    <h4 className="font-bold text-gray-800 mb-2">ממתינים לתשובות</h4>
                                    <p className="text-gray-500 text-sm">סמנו את המשפטים שמתאימים לכם בטופס מימין, וההמלצה שלנו תופיע כאן.</p>
                                </div>
                            ) : (
                                <div className="bg-brand-softBlue/40 border border-brand-blue/10 rounded-3xl p-8 shadow-sm">
                                    <IconAlert className="w-10 h-10 text-brand-blue mb-4" />
                                    <h4 className="font-bold text-gray-900 text-xl mb-3">{resultTitle}</h4>
                                    <p className="text-gray-700 mb-6 leading-relaxed">{resultText}</p>
                                    <button onClick={() => navigate('guidance')} className="w-full bg-brand-blue text-white px-5 py-3.5 rounded-xl font-bold hover:bg-brand-blue/90 transition shadow-sm">
                                        {primaryCtaLabel}
                                    </button>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const IndividualsPage = ({ navigate }) => (
            <div className="animate-fade-in bg-gray-50/50 pb-20">
                 <InternalHero 
                    title="מידע למתמודדים" 
                    subtitle="אנחנו רואים את העוצמה של הכאב, ויודעים שיש דרך להרגיש אחרת."
                    icon={IconHeart}
                />
                
                <div className="container mx-auto px-4 max-w-5xl">
                    
                    {/* Validation & Hope Section */}
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-soft border border-gray-100 mb-10 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-2 h-full bg-brand-blue"></div>
                        <h2 className="text-2xl font-bold text-brand-blue mb-6">הרגשות שלכם אמיתיים, והם מובנים לחלוטין</h2>
                        <div className="text-lg text-gray-700 leading-relaxed space-y-4">
                            <p>
                                לחיות עם הפרעת אישיות גבולית (BPD) או אי-ויסות רגשי חמור זה לחוות את העולם בעצימות גבוהה מאוד. כשכואב - הכאב הוא פיזי כמעט. כשמפחדים - הפחד משתק. פעמים רבות, הסביבה משדרת לכם שאתם מגיבים בעוצמה, מה שעלול להשאיר אתכם בתחושת בדידות עמוקה.
                            </p>
                            <p>
                                אנחנו כאן כדי להגיד בצורה ברורה: <strong className="text-brand-blue">הכאב שאתם חווים הוא אמיתי, והתגובות שלכם הגיוניות לחלוטין בהתחשב בעוצמת הרגש שאתם מתמודדים איתה.</strong> ההתמודדות, בין אם כלפי חוץ ובין אם פנימה (הפרעת אישיות גבולית "שקטה"), דורשת תעצומות נפש אדירות. אבל חשוב שתדעו שאתם לא חייבים להמשיך לנווט בסערה הזו לבד.
                            </p>
                            <div className="bg-brand-softBlue/30 p-5 rounded-2xl border border-brand-softBlue mt-6">
                                <p className="font-medium text-brand-blue">
                                    יש היום תקווה ממשית, המבוססת על מחקרים קליניים מתמשכים. בעזרת גישות מבוססות מחקר, ובראשן טיפול דיאלקטי-התנהגותי (DBT), מתמודדים רבים לומדים בהצלחה כיצד לווסת את עוצמת הרגש, לשפר מערכות יחסים, ולבנות "חיים ששווה לחיות אותם".
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* How we can help grid */}
                    <h3 className="text-2xl font-bold text-center text-brand-blue mb-8">מה אפשר למצוא כאן שיכול לעזור?</h3>
                    <div className="grid md:grid-cols-2 gap-6 mb-12">
                        <div className="bg-white p-8 rounded-3xl shadow-softer border border-gray-100 hover:shadow-soft transition flex flex-col h-full group">
                            <div className="w-14 h-14 bg-brand-softBlue text-brand-blue rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition">
                                <IconBook className="w-6 h-6" />
                            </div>
                            <h4 className="text-xl font-bold text-gray-800 mb-3">ידע, הבנה ובהירות</h4>
                            <p className="text-gray-600 mb-6 flex-grow leading-relaxed">
